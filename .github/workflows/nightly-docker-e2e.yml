name: Nightly Docker E2E

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  docker-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests
      - name: Docker compose E2E (opt-in full stack)
        env:
          SKIP_DOCKER_TESTS: "0"
          SKIP_DOCKER_E2E: "0"
        run: python -m pytest tests/test_docker_stack_integration.py::TestDockerStackIntegration -q --tb=short
