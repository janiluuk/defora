services:
  encoder:
    image: jrottenberg/ffmpeg:4.4-alpine
    entrypoint: ["sh", "/usr/local/bin/ffmpeg-frame-worker.sh"]
    volumes:
      - frames:/data/frames
      - ./scripts/ffmpeg-frame-worker.sh:/usr/local/bin/ffmpeg-frame-worker.sh:ro
    environment:
      - ENCODER_QUALITY=${ENCODER_QUALITY:-medium}
      - FPS=${FPS:-24}
      - RESOLUTION=${RESOLUTION:-1280:720}
      - FRAMES_DIR=/data/frames
      - RTMP_TARGET=rtmp://web:1935/live/deforum
    depends_on:
      - web
      - sd-forge

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "8080:80"
      - "1935:1935"
    extra_hosts:
      - "vimage2:${VIMAGE2_IP:-192.168.2.101}"
    volumes:
      - frames:/data/frames:ro
      - hls:/var/www/hls
      - runs:/data/runs
    environment:
      - RABBIT_URL=amqp://mq
      - FRAMES_DIR=/data/frames
      - RUNS_DIR=/data/runs
      - HLS_STREAM=/hls/live/deforum.m3u8
      - HLS_DIR=/var/www/hls
      # VideoSwarm lives alongside runs/projects so storage is shared.
      - VIDEOSWARM_DIR=/data/runs/videoswarm
      # Optional: point Defora at an external VideoSwarm host (served/proxied via /api/videoswarm-proxy/*)
      # - VIDEOSWARM_API_BASE=http://videoswarm-host:8081
      - SD_FORGE_HOST=${SD_FORGE_HOST:-192.168.2.101}
      - SD_FORGE_PORT=${SD_FORGE_PORT:-7860}
      - MEDIATOR_HOST=${MEDIATOR_HOST:-vimage2}
      - MEDIATOR_PORT=${MEDIATOR_PORT:-8766}
      - DEF_MEDIATOR_HOST=${DEF_MEDIATOR_HOST:-vimage2}
      - DEF_MEDIATOR_PORT=${DEF_MEDIATOR_PORT:-8766}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://192.168.2.104:11434}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mediator:
    build:
      context: .
      dockerfile: docker/mediator/Dockerfile
    ports:
      - "8765:8765"
      - "8766:8766"
    extra_hosts:
      - "vimage2:${VIMAGE2_IP:-192.168.2.101}"
    environment:
      - MEDIATOR_DEFORUM_ADDRESS=0.0.0.0
      - MEDIATOR_DEFORUM_PORT=8765
      - MEDIATOR_DEFORUMATION_ADDRESS=0.0.0.0
      - MEDIATOR_DEFORUMATION_PORT=8766
      - DEFORUMATION_ADDRESS=${DEFORUMATION_ADDRESS:-vimage2}
      - DEFORUMATION_PORT=${DEFORUMATION_PORT:-8767}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8765)); s.close(); s2=socket.socket(); s2.settimeout(2); s2.connect(('localhost',8766)); s2.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  sd-forge:
    build:
      context: .
      dockerfile: docker/sd-forge/Dockerfile
      args:
        DEFORUM_MEDIATOR_URL: ${DEFORUM_MEDIATOR_URL:-ws://mediator:8765}
    image: sd-forge:latest
    command: 
      - python
      - launch.py
      - --listen
      - --port
      - "7860"
      - --deforum-api
      - --enable-insecure-extension-access
      - --skip-version-check
      - --no-half-vae
      - --xformers
    ports:
      - "7860:7860"
    volumes:
      - frames:/data/frames
      - hls:/var/www/hls
      - models:/stable-diffusion-webui/models
      - outputs:/stable-diffusion-webui/outputs
    environment:
      - OUTPUT_DIR=/data/frames
      - HLS_PATH=/var/www/hls
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7860/docs\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      web:
        condition: service_healthy
      mediator:
        condition: service_healthy

  dev-frame-seeder:
    build:
      context: .
      dockerfile: docker/frame-seeder/Dockerfile
    environment:
      - OUTPUT_DIR=/data/frames
      - FPS=${SEEDER_FPS:-12}
      - CLEAR=${SEEDER_CLEAR:-1}
      - PATTERN=${SEEDER_PATTERN:-timestamp}
      - CUSTOM_TEXT=${SEEDER_CUSTOM_TEXT:-Defora Test}
      - WIDTH=${SEEDER_WIDTH:-1280}
      - HEIGHT=${SEEDER_HEIGHT:-720}
    volumes:
      - frames:/data/frames
    depends_on:
      - web

  mq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - mqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  control-bridge:
    build:
      context: .
      dockerfile: docker/bridge/Dockerfile
    extra_hosts:
      - "vimage2:${VIMAGE2_IP:-192.168.2.101}"
    environment:
      - MQ_URL=amqp://mq
      - MQ_QUEUE=controls
      - MEDIATOR_HOST=${MEDIATOR_HOST:-vimage2}
      - MEDIATOR_PORT=${MEDIATOR_PORT:-8766}
    depends_on:
      mq:
        condition: service_healthy
      mediator:
        condition: service_healthy

volumes:
  frames:
  hls:
  mqdata:
  models:
  outputs:
  runs:
