worker_processes 1;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    upstream app {
        server 127.0.0.1:3000;
    }
    upstream hls_node {
        server vimage3:80;
    }

    server {
        listen 80;
        root /usr/share/nginx/html/public;

        location /api {
            proxy_pass http://app;
            proxy_set_header Host $host;
        }

        location /uploads {
            proxy_pass http://app;
            proxy_set_header Host $host;
        }

        # Serve PNG/JPEG frames directly from the shared volume (bypass Node).
        location /frames/ {
            alias /data/frames/;
            sendfile on;
            tcp_nopush on;
            add_header Cache-Control "public, max-age=86400";
            access_log off;
        }

        location /ws {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # HLS is packaged on the stream node (vimage3); proxy so the UI stays same-origin.
        location /hls/ {
            proxy_pass http://hls_node/hls/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering off;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location / {
            try_files $uri /index.html;
        }
    }
}
