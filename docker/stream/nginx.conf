worker_processes 1;

events { worker_connections 1024; }

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        application live {
            live on;
            record off;
            hls on;
            hls_path /var/www/hls/live;
            hls_fragment 1s;
            hls_playlist_length 10s;
            allow publish all;
            allow play all;
        }
    }
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias /var/www/hls;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 200 "Defora stream node (RTMP 1935, HLS /hls/live/deforum.m3u8)\n";
            add_header Content-Type text/plain;
        }
    }
}
