# Docker Compose configuration for Defora with pre-loaded Turbo models
# This setup includes SD-Forge with SD-Turbo and SDXL-Turbo models for fast live generation
#
# Usage:
#   docker compose -f docker-compose.turbo.yml up --build
#
# Features:
#   - Pre-downloads SD-Turbo and SDXL-Turbo models
#   - Optimized for real-time/live video generation
#   - Includes all Defora services with turbo-optimized settings

services:
  # Model downloader service - runs once to fetch turbo models
  model-downloader:
    image: curlimages/curl:latest
    volumes:
      - models:/models
    entrypoint: /bin/sh
    command: >
      -c "
      echo 'Downloading Turbo models...';
      
      mkdir -p /models/Stable-diffusion;
      
      # Download SD-Turbo (512x512, 1-4 steps)
      if [ ! -f /models/Stable-diffusion/sd_turbo.safetensors ]; then
        echo 'Downloading SD-Turbo...';
        curl -L -o /models/Stable-diffusion/sd_turbo.safetensors \
          'https://huggingface.co/stabilityai/sd-turbo/resolve/main/sd_turbo.safetensors';
      else
        echo 'SD-Turbo already downloaded';
      fi;
      
      # Download SDXL-Turbo (1024x1024, 1-4 steps)
      if [ ! -f /models/Stable-diffusion/sdxl_turbo.safetensors ]; then
        echo 'Downloading SDXL-Turbo...';
        curl -L -o /models/Stable-diffusion/sdxl_turbo.safetensors \
          'https://huggingface.co/stabilityai/sdxl-turbo/resolve/main/sd_xl_turbo_1.0.safetensors';
      else
        echo 'SDXL-Turbo already downloaded';
      fi;
      
      # Download VAE for better quality
      if [ ! -f /models/VAE/vae-ft-mse-840000-ema-pruned.safetensors ]; then
        echo 'Downloading VAE...';
        mkdir -p /models/VAE;
        curl -L -o /models/VAE/vae-ft-mse-840000-ema-pruned.safetensors \
          'https://huggingface.co/stabilityai/sd-vae-ft-mse-original/resolve/main/vae-ft-mse-840000-ema-pruned.safetensors';
      else
        echo 'VAE already downloaded';
      fi;
      
      echo 'Model download complete!';
      echo '';
      echo 'Models downloaded:';
      ls -lh /models/Stable-diffusion/;
      echo '';
      echo 'Ready to start SD-Forge service.';
      "

  encoder:
    image: jrottenberg/ffmpeg:4.4-alpine
    entrypoint: ["sh", "/usr/local/bin/ffmpeg-frame-worker.sh"]
    volumes:
      - frames:/data/frames
      - ./scripts/ffmpeg-frame-worker.sh:/usr/local/bin/ffmpeg-frame-worker.sh:ro
    environment:
      - ENCODER_QUALITY=${ENCODER_QUALITY:-turbo}
      - FPS=${FPS:-24}
      - RESOLUTION=${RESOLUTION:-960:540}
      - FRAMES_DIR=/data/frames
      - ENCODER_SCAN_INTERVAL=${ENCODER_SCAN_INTERVAL:-0.25}
      - ENCODER_REALTIME=${ENCODER_REALTIME:-0}
      - RTMP_TARGET=rtmp://web:1935/live/deforum
    depends_on:
      - web

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "8080:80"
      - "1935:1935"
      - "3000:3000"
    volumes:
      - frames:/data/frames:ro
      - hls:/var/www/hls
      - runs:/data/runs
    environment:
      - RABBIT_URL=amqp://mq
      - FRAMES_DIR=/data/frames
      - RUNS_DIR=/data/runs
      - UPLOADS_DIR=/data/runs/uploads
      - HLS_STREAM=/hls/live/deforum.m3u8
      - HLS_DIR=/var/www/hls
      # VideoSwarm lives alongside runs/projects so storage is shared.
      - VIDEOSWARM_DIR=/data/runs/videoswarm
      # Optional: point Defora at an external VideoSwarm host (served/proxied via /api/videoswarm-proxy/*)
      # - VIDEOSWARM_API_BASE=http://videoswarm-host:8081
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://192.168.2.104:11434}
      # Turbo model optimization hints
      - DEFAULT_STEPS=2
      - DEFAULT_CFG=1.0
      - ENABLE_PERFORMANCE_MODE=true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health" , "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mediator:
    build:
      context: .
      dockerfile: docker/mediator/Dockerfile
    ports:
      - "8765:8765"
      - "8766:8766"
    extra_hosts:
      - "vimage2:${VIMAGE2_IP:-192.168.2.101}"
    environment:
      - MEDIATOR_DEFORUM_ADDRESS=0.0.0.0
      - MEDIATOR_DEFORUM_PORT=8765
      - MEDIATOR_DEFORUMATION_ADDRESS=0.0.0.0
      - MEDIATOR_DEFORUMATION_PORT=8766
      - DEFORUMATION_ADDRESS=${DEFORUMATION_ADDRESS:-vimage2}
      - DEFORUMATION_PORT=${DEFORUMATION_PORT:-8767}
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8765 && nc -z localhost 8766 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  sd-forge-turbo:
    build:
      context: .
      dockerfile: docker/sd-forge/Dockerfile
      args:
        DEFORUM_MEDIATOR_URL: ${DEFORUM_MEDIATOR_URL:-ws://mediator:8765}
    image: sd-forge-turbo:latest
    gpus: all
    command: 
      - python
      - launch.py
      - --listen
      - --port
      - "7860"
      - --deforum-api
      - --enable-insecure-extension-access
      - --skip-version-check
      - --no-half-vae
      - --xformers
      # Turbo-specific optimizations
      - --opt-sdp-attention
      - --disable-safe-unpickle
      - --api
    ports:
      - "7860:7860"
    volumes:
      - frames:/data/frames
      - hls:/var/www/hls
      - models:/stable-diffusion-webui/models
      - outputs:/stable-diffusion-webui/outputs
    environment:
      - OUTPUT_DIR=/data/frames
      - HLS_PATH=/var/www/hls
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Turbo model defaults
      - COMMANDLINE_ARGS=--medvram --opt-split-attention
      # Performance hints
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7860/docs\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s  # Extended for model loading
    depends_on:
      model-downloader:
        condition: service_completed_successfully
      web:
        condition: service_healthy
      mediator:
        condition: service_healthy

  dev-frame-seeder:
    build:
      context: .
      dockerfile: docker/frame-seeder/Dockerfile
    environment:
      - OUTPUT_DIR=/data/frames
      - FPS=${SEEDER_FPS:-12}
      - CLEAR=${SEEDER_CLEAR:-1}
      - PATTERN=${SEEDER_PATTERN:-timestamp}
      - CUSTOM_TEXT=${SEEDER_CUSTOM_TEXT:-Defora Turbo Test}
      - WIDTH=${SEEDER_WIDTH:-1280}
      - HEIGHT=${SEEDER_HEIGHT:-720}
    volumes:
      - frames:/data/frames
    depends_on:
      - web

  mq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - mqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  control-bridge:
    build:
      context: .
      dockerfile: docker/bridge/Dockerfile
    environment:
      - MQ_URL=amqp://mq
      - MQ_QUEUE=controls
      - MEDIATOR_HOST=${MEDIATOR_HOST:-mediator}
      - MEDIATOR_PORT=${MEDIATOR_PORT:-8766}
    depends_on:
      mq:
        condition: service_healthy
      mediator:
        condition: service_healthy

volumes:
  frames:
  hls:
  mqdata:
  models:
  outputs:
  runs:
